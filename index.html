<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="Ett enkelt Pokémon-spel för barn 5–7 år. Tryck på rätt bild — inget läsande krävs."
    >
    <title>Pokémon Barnspel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sky" aria-hidden="true"></div>
    <div class="confetti" id="confetti" aria-hidden="true"></div>

    <div class="app">
        <header class="top">
            <p class="top__eyebrow">För barn 5–7 år</p>
            <h1 class="top__title">Hitta rätt Pokémon!</h1>
            <p class="top__hint">Titta på bilden uppe. Tryck på samma Pokémon nedan.</p>
        </header>

        <section class="scoreboard" aria-label="Poäng">
            <div class="stars" id="stars" aria-live="polite">
                <span class="star" data-star="1">★</span>
                <span class="star" data-star="2">★</span>
                <span class="star" data-star="3">★</span>
                <span class="star" data-star="4">★</span>
                <span class="star" data-star="5">★</span>
            </div>
            <p class="round-label" id="roundLabel">Runda 1 av 5</p>
        </section>

        <section class="question card" aria-live="polite">
            <p class="question__prompt" id="promptText">Vem är det?</p>
            <div class="question__image-wrap">
                <img
                    id="questionImage"
                    class="question__image"
                    src=""
                    alt=""
                    width="220"
                    height="220"
                >
            </div>
            <p class="question__name" id="questionName" hidden></p>
        </section>

        <section class="choices" id="choices" aria-label="Välj Pokémon">
            <!-- Fylls i av JavaScript -->
        </section>

        <p class="feedback" id="feedback" role="status" aria-live="assertive"></p>

        <div class="actions">
            <button type="button" class="btn btn--primary" id="nextButton" hidden>
                Nästa runda →
            </button>
            <button type="button" class="btn btn--secondary" id="playAgainButton" hidden>
                Spela igen
            </button>
            <button type="button" class="btn btn--ghost" id="soundButton" aria-pressed="true">
                🔊 Ljud på
            </button>
        </div>

        <footer class="footer">
            <p>Data från <a href="https://pokeapi.co/" rel="noopener noreferrer">PokeAPI</a></p>
            <p class="footer__note">Syskonprojekt till <a href="https://github.com/Elli2022/pokemon-search-app">pokemon-search-app</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
